spring:
  application:
    name: workflow-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_platform
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/workflow-platform}

server:
  port: 8080

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%c","correlationId":"%X{correlationId:-}","workflowInstanceId":"%X{workflowInstanceId:-}","nodeInstanceId":"%X{nodeInstanceId:-}","businessKey":"%X{businessKey:-}","message":"%msg"}%n'

workflow-platform:
  connector:
    default-timeout: 5s
    default-max-attempts: 3

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
